name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # ----------------------------
  # Job 1: Flake8 Linting
  # ----------------------------
  flake8:
    name: Lint with flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  # ----------------------------
  # Job 2: Black Formatting Check
  # ----------------------------
  black:
    name: Check code formatting with black
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install black
        run: pip install black

      - name: Run black check
        run: black .

  # ----------------------------
  # Job 3: Isort Import Order Check
  # ----------------------------
  isort:
    name: Check import order with isort
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install isort
        run: pip install isort

      - name: Run isort check
        run: isort .

  # ----------------------------
  # Job 4: Unit Tests
  # ----------------------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: [flake8, black, isort]  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fastapi-requirement.txt
          pip install pytest

      - name: Run pytest
        run: python -m pytest tests --maxfail=5 --disable-warnings -q

