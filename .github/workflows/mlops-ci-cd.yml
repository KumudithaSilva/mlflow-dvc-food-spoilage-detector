name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  # ----------------------------
  # Job 1: Flake8 Linting
  # ----------------------------
  flake8:
    name: Lint with flake8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 .

  # ----------------------------
  # Job 2: Black Formatting Check
  # ----------------------------
  black:
    name: Check code formatting with black
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install black
        run: pip install black

      - name: Run black check
        run: black .

  # ----------------------------
  # Job 3: Isort Import Order Check
  # ----------------------------
  isort:
    name: Check import order with isort
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install isort
        run: pip install isort

      - name: Run isort check
        run: isort .

  # ----------------------------
  # Job 4: AWS Auth + ECR Login Test
  # ----------------------------
  aws-login:
    name: AWS Auth & ECR Login
    runs-on: ubuntu-latest
    needs: [flake8, black, isort]

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

  # ----------------------------
  # Job 5: Docker Build & Push to ECR
  # ----------------------------
  docker-build-push:
    name: Build & Push Docker Images to ECR
    runs-on: ubuntu-latest
    needs: aws-login

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # ---------- FastAPI ----------
      - name: Build FastAPI image
        run: |
          docker build \
            -f Dockerfile.fastapi \
            -t fastapi-app:latest .

      - name: Tag & Push FastAPI image
        run: |
          docker tag fastapi-app:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fastapi-app:latest
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/fastapi-app:latest

      # ---------- Streamlit ----------
      - name: Build Streamlit image
        run: |
          docker build \
            -f Dockerfile.streamlit \
            -t streamlit-app:latest .

      - name: Tag & Push Streamlit image
        run: |
          docker tag streamlit-app:latest \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/streamlit-app:latest
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/streamlit-app:latest

